name: tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies only
        # The regression suite runs in heuristic mode and doesn't need
        # streamlit/opencv/fastapi -- just numpy/pandas/scipy/pytest.
        run: |
          pip install numpy pandas scipy pytest

      - name: Run regression suite
        run: pytest tests/ -v
